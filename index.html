<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Massaia Party Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <h1>Welcome to the Massaia Party Game!</h1>
        <div id="quiz">
            <h2>Quiz</h2>
            <div id="questions"></div>
            <button id="submit">Submit Answers</button>
        </div>
        <div id="timer">Time: <span id="time-left">30</span> seconds</div>
        <div id="prizes">
            <h2>Your Prizes</h2>
            <div id="prize-list"></div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>

<script>
let questions = [
    {question: "Question 1: What is your name?", options: ["Alice", "Bob", "Charlie"], answer: "Alice"},
    {question: "Question 2: What is your favorite color?", options: ["Red", "Green", "Blue"], answer: "Red"},
    {question: "Question 3: What is your hobby?", options: ["Reading", "Traveling", "Gaming"], answer: "Reading"},
    {question: "Question 4: What is your favorite food?", options: ["Pizza", "Pasta", "Salad"], answer: "Pizza"},
    {question: "Question 5: What is your favorite animal?", options: ["Dog", "Cat", "Bird"], answer: "Dog"},
    {question: "Question 6: What is your favorite movie?", options: ["Inception", "Titanic", "Avatar"], answer: "Inception"},
    {question: "Question 7: What is your favorite book?", options: ["1984", "Moby Dick", "To Kill a Mockingbird"], answer: "1984"},
    {question: "Question 8: Where do you live?", options: ["New York", "Los Angeles", "Chicago"], answer: "New York"},
    {question: "Question 9: What is your dream job?", options: ["Doctor", "Engineer", "Artist"], answer: "Doctor"},
    {question: "Question 10: What is your favorite sport?", options: ["Soccer", "Basketball", "Tennis"], answer: "Soccer"},
    {question: "Question 11: What is your favorite season?", options: ["Spring", "Summer", "Winter"], answer: "Spring"},
    {question: "Question 12: What is your favorite city?", options: ["New York", "Paris", "Tokyo"], answer: "Tokyo"},
    {question: "Question 13: Who is your favorite artist?", options: ["Van Gogh", "Picasso", "Da Vinci"], answer: "Van Gogh"},
    {question: "Question 14: What is your favorite music genre?", options: ["Rock", "Pop", "Classical"], answer: "Pop"}
];

let timer; 
let timeLeft = 30; 

function startTimer() {
    timer = setInterval(() => {
        if (timeLeft > 0) {
            timeLeft--;
            document.getElementById('time-left').innerText = timeLeft;
        } else {
            clearInterval(timer);
            alert('Time is up!');
        }
    }, 1000);
}

function submitAnswers() {
    clearInterval(timer);
    // logic to evaluate answers and show prizes
    alert('Well done! Check your prizes.');
}

document.getElementById('submit').onclick = submitAnswers;
startTimer();
</script>
