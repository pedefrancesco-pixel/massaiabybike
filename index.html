<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Massaia Party Game</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #quiz { display: none; }
        .confetti { position: fixed; pointer-events: none; }
    </style>
</head>
<body>
    <h1>Welcome to the Massaia Party Game!</h1>
    <button id="start-button">Start Game</button>
    <div id="quiz">
        <h2>Quiz Questions</h2>
        <div id="question"></div>
        <button id="next-button">Next</button>
    </div>
    <div id="result"></div>
    <script>
        const questions = [
            { question: 'What is the capital of Italy?', answers: ['Rome', 'Milan', 'Naples'], correct: 0 },
            { question: 'What is the currency of Japan?', answers: ['Yen', 'Won', 'Dollar'], correct: 0 },
            { question: 'What year did WWII end?', answers: ['1945', '1944', '1946'], correct: 0 }
        ];
        let currentQuestionIndex = 0;
        const startButton = document.getElementById('start-button');
        const quizDiv = document.getElementById('quiz');
        const questionDiv = document.getElementById('question');
        const nextButton = document.getElementById('next-button');
        const resultDiv = document.getElementById('result');

        startButton.addEventListener('click', function() {
            startButton.style.display = 'none';
            quizDiv.style.display = 'block';
            showQuestion();
        });

        function showQuestion() {
            const currentQuestion = questions[currentQuestionIndex];
            questionDiv.innerHTML = currentQuestion.question + '<br>' + currentQuestion.answers.map((ans, index) => '<button class="answer">' + ans + '</button>').join('');
            document.querySelectorAll('.answer').forEach((button, index) => {
                button.addEventListener('click', function() { checkAnswer(index); });
            });
        }

        function checkAnswer(selected) {
            const currentQuestion = questions[currentQuestionIndex];
            if (selected === currentQuestion.correct) {
                alert('Correct!');
            } else {
                alert('Wrong answer!');
            }
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                showQuestion();
            } else {
                endGame();
            }
        }

        function endGame() {
            quizDiv.style.display = 'none';
            resultDiv.innerHTML = 'Game Over!';
            unlockPrize();
            showConfetti();
        }

        function unlockPrize() {
            alert('You have unlocked a prize! 🎉');
        }

        function showConfetti() {
            const canvas = document.createElement('canvas');
            canvas.classList.add('confetti');
            document.body.appendChild(canvas);
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Confetti drawing logic here.
            alert('Confetti!'); // Replace with actual confetti animation.
        }
    </script>
</body>
</html>
