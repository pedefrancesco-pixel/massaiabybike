<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Massaia by bike - PARTY MODE</title>

<style>
body{
  margin:0;
  background:radial-gradient(circle at top,#1a0f2e,#0b0b0f);
  color:#f2f2f2;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}
.wrap{max-width:900px;margin:0 auto;padding:18px}
.card{background:#14141b;border:1px solid #242434;border-radius:16px;padding:16px;position:relative;overflow:hidden}
h1,h2{margin:0 0 8px}
.sub{color:#c9c9ff;margin-bottom:10px}
.muted{color:#b8b8c8}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.pill{padding:6px 10px;border-radius:999px;background:#20202a;border:1px solid #2f2f3f;font-weight:700}
.btn{cursor:pointer;border:0;border-radius:12px;padding:12px 14px;background:#6b2bd6;color:#fff;font-weight:800}
.btn.secondary{background:#2a2a33}
.progress{height:10px;background:#20202a;border:1px solid #2f2f3f;border-radius:999px;overflow:hidden}
.bar{height:100%;width:0%;background:#ff5b7a;transition:width .4s ease}
.answers{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.ans{padding:14px;border-radius:12px;background:#1d1d27;border:1px solid #2a2a3a;cursor:pointer;font-weight:800}
.ans:hover{border-color:#ff5b7a}
.toast{margin-top:12px;padding:12px;border-radius:12px;border:1px solid #2a2a3a;background:#101018;animation:pop .3s ease}
.toast.ok{border-color:#2bd67d}
.toast.bad{border-color:#ff5b7a}
@keyframes pop{from{transform:scale(.95);opacity:.6}to{transform:scale(1);opacity:1}}

.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.thumb{aspect-ratio:1/1;border-radius:12px;border:1px solid #2a2a3a;background:#1a1a23;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.thumb.locked::after{content:"🔒";position:absolute;right:8px;bottom:8px;font-size:18px;background:#0008;padding:6px 8px;border-radius:999px}
.thumb img{width:100%;height:100%;object-fit:cover}
.timer{font-weight:900;color:#ff5b7a;font-size:18px}
canvas{position:absolute;top:0;left:0;pointer-events:none}
</style>
</head>
<body>

<div class="wrap">
  <div class="card" id="screen"></div>
</div>

<script>
const COVER_IMG="cover.jpg";
const PRIZE_IMG=(n)=>`p${n}.jpg`;

const QUIZ=[
{q:"Q1) Renata preferirebbe andare a letto con un arabo o con un tedesco?",a:["Arabo","Tedesco"],correct:0,unlockPrize:1,winShot:false},
{q:"Q2) capitale della Birmania?",a:["Naypyidaw","Yangon"],correct:1,unlockPrize:null,winShot:true},
{q:"Q3) Eva preferirebbe una notte con un senegalese o 10 notti con 10 senegalesi?",a:["1 notte 1 senegalese","10 notti 10 senegalesi"],correct:1,unlockPrize:2,winShot:false},
{q:"Q4) quale settore c'è tra mesosfera ed esosfera?",a:["termosfera","ionosfera"],correct:0,unlockPrize:null,winShot:true},
{q:"Q5) Francesco preferirebbe andare al lavoro dopo una notte di sonno rilassante oppure svegliato da sesso orale all'alba?",a:["dormire tranquillo","Pompino all'alba"],correct:1,unlockPrize:3,winShot:false},
{q:"Q6) a che velocità può correre un gatto?",a:["35KM/h","50 KM/h"],correct:1,unlockPrize:null,winShot:true},
{q:"Q7) Nic preferirebbe essere un professore di algebra o presidente del baccaneliac?",a:["presidente del baccaneliac","Risposta B"],correct:1,unlockPrize:4,winShot:false},
{q:"Q8) qual'è la canzone più famosa di tutto il mondo?",a:["Imagine di john lenon","Happy birthday"],correct:1,unlockPrize:null,winShot:true},
{q:"Q9) qual'è lo scopo di Francesco, arrivato da un altro pianeta..? portare pace e prosperità al mondo oppure Camuffare la sua vera voce rauca per rapire le donne?",a:["salvare il pianeta","rapire le donne"],correct:1,unlockPrize:5,winShot:false},
{q:"Q10) secondo fonti ufficiali,Eva non ha mai provato a rubare nulla oppure ha rubato dei trucchi?",a:["Innocente","Colpevole"],correct:1,unlockPrize:6,winShot:false},
{q:"Q11) secondo fonti ufficiali, quando Eva rubò quei trucchi, l'impresa fu portata a termine con successo oppure venne fermata dalle autorità?",a:["Successo","Sgamataaa"],correct:1,unlockPrize:7,winShot:false},
{q:"Q12) rischieresti la vita per esplorare i fondali dell'oceano o rubare una carruba?",a:["Fondali marini","Carrube"],correct:1,unlockPrize:null,winShot:true},
{q:"Q13) quanto shot di gin si possono bere prima di sentirsi male?",a:["14","Infiniti"],correct:1,unlockPrize:8,winShot:false},
{q:"Q14) Renata non ha mai detto di no a un'orgia oppure pulito la pipì di uno sconosciuto dal pavimento in camera sua?",a:["orgie abolite","pulire pipì"],correct:1,unlockPrize:9,winShot:false},
];

let idx=0,shots=0,timerInterval,timeLeft=10;
const prizeUnlocked=Array(10).fill(false);
const el=id=>document.getElementById(id);

function playSound(type){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  if(type==="win"){o.frequency.value=600;}
  if(type==="bad"){o.frequency.value=120;}
  if(type==="prize"){o.frequency.value=900;}
  if(type==="tick"){o.frequency.value=400;}
  g.gain.value=.1;
  o.start();
  o.stop(ctx.currentTime+.15);
}

function startTimer(){
  timeLeft=10;
  timerInterval=setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").textContent=`⏱ ${timeLeft}s`;
    playSound("tick");
    if(timeLeft<=0){
      clearInterval(timerInterval);
      shots++;
      playSound("bad");
      toast("bad","⏰ TEMPO SCADUTO! SHOT 🍸<br><button class='btn' onclick='next()'>Avanti</button>");
    }
  },1000);
}

function stopTimer(){clearInterval(timerInterval);}

function confetti(){
  const canvas=document.createElement("canvas");
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  document.body.appendChild(canvas);
  const ctx=canvas.getContext("2d");
  const pieces=Array.from({length:150},()=>({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height-canvas.height,
    r:Math.random()*6+4,
    d:Math.random()*5+2,
    color:`hsl(${Math.random()*360},100%,60%)`
  }));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.beginPath();
      ctx.fillStyle=p.color;
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();
      p.y+=p.d;
    });
    frame++;
    if(frame<100)requestAnimationFrame(draw);
    else canvas.remove();
  }
  draw();
}

function topbar(){
  const pct=Math.round(((idx)/QUIZ.length)*100);
  return `
  <div class="row" style="justify-content:space-between;margin-bottom:12px">
  <span class="pill">Shot: ${shots} 🍸</span>
  <span class="timer" id="timer">⏱ 10s</span>
  </div>
  <div class="progress"><div class="bar" style="width:${pct}%"></div></div>
  `;
}

function home(){
  el("screen").innerHTML=``
  <h1>🔥 MASSAIA PARTY MODE 🍸</h1>
  <p class="sub">Sbagli = SHOT. Tempo scade = SHOT.</p>
  <button class="btn" onclick="start()">INIZIA LA FESTA</button>
  ``;
}

function renderQ(){
  const item=QUIZ[idx];
  el("screen").innerHTML=``
  ${topbar()}
  <h2>${item.q}</h2>
  <div class="answers">
  <button class="ans" onclick="answer(0)">${item.a[0]}</button>
  <button class="ans" onclick="answer(1)">${item.a[1]}</button>
  </div>
  <div id="toast"></div>
  ``;
  startTimer();
}

function toast(type,html){
  el("toast").innerHTML=`<div class="toast ${type}">${html}</div>`;
}

function answer(i){
  stopTimer();
  const item=QUIZ[idx];
  if(i===item.correct){
    playSound("win");
    if(item.winShot){
      toast("ok","✅ Hai vinto uno SHOT 🍸<br><button class='btn' onclick='next()'>Avanti</button>");
      return;
    }
    if(item.unlockPrize){
      prizeUnlocked[item.unlockPrize]=true;
      playSound("prize");
      confetti();
      toast("ok",`🎉 Premio sbloccato!<br><img src="${PRIZE_IMG(item.unlockPrize)}" width="100%"><br><button class='btn' onclick='next()'>Avanti</button>`);
      return;
    }
  }else{
    shots++;
    playSound("bad");
    toast("bad","❌ SBAGLIATO! SHOT 🍸<br><button class='btn' onclick='next()'>Avanti</button>");
  }
}

function next(){
  if(idx<QUIZ.length-1){idx++;renderQ();}
  else end();
}

function end(){
  el("screen").innerHTML=``
  <h2>🔥 FINE 🔥</h2>
  <p>Shot totali: <b>${shots}</b> 🍸</p>
  <button class="btn" onclick="reset()">Rigioca</button>
  ``;
}

function start(){idx=0;shots=0;renderQ();}
function reset(){idx=0;shots=0;home();}

home();
</script>
</body>
</html>
